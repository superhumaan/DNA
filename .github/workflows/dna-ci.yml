# DNA CI — canonical quality gates + health report
# Mode: strict (fails the run when a required gate fails).
# Every push produces a canonical, sanitized health report (JSON + Markdown),
# publishes it to the GitHub Step Summary, and uploads durable artifacts.

name: DNA CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate + health report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # Tests + scoped coverage + machine-readable test results in one pass.
      - name: Unit tests + coverage
        run: |
          mkdir -p .dna-reports
          pnpm exec vitest run --coverage --reporter=json --outputFile=.dna-reports/test-results.json

      - name: Enforce per-file + total coverage >= 80%
        run: |
          node -e "
            const { readFileSync } = require('node:fs');
            const s = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const t = 80;
            const fail = [];
            for (const [file, m] of Object.entries(s)) {
              if (file === 'total') continue;
              if (m.lines.pct < t) fail.push(file + ': lines ' + m.lines.pct + '%');
            }
            if (s.total.lines.pct < t) fail.push('TOTAL: ' + s.total.lines.pct + '%');
            if (fail.length) { console.error(fail.join('\\n')); process.exit(1); }
          "

      - name: DNA Lab load gate (200 concurrent viewers)
        run: pnpm run test:load:lab

      # Capture the quality report as machine-readable input for the canonical
      # health report (does not fail the run — the gate step below enforces it).
      - name: Capture quality report (JSON)
        if: always()
        run: |
          mkdir -p .dna-reports
          node packages/dna-cli/dist/index.js quality report --json --no-toolchain > .dna-reports/quality.json

      # Dependency audit as machine-readable input for the health report. The
      # blocking OWASP gate lives in the dedicated `security` job below.
      - name: Capture dependency audit (JSON)
        if: always()
        run: |
          mkdir -p .dna-reports
          pnpm audit --json > .dna-reports/audit.json || true

      - name: Compose canonical health report
        if: always()
        run: pnpm run health:report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload canonical health report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dna-health-report
          path: |
            .dna-reports/
            .DNA/reports/
          retention-days: 30
          if-no-files-found: ignore

      # Enforce the SAST quality gate last so the health report + artifacts are
      # always produced first, even when the gate fails.
      - name: DNA quality gate (SAST)
        run: node packages/dna-cli/dist/index.js quality report --fail --no-toolchain

  e2e:
    name: Lab Chromium smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install Playwright Chromium
        run: pnpm run test:e2e:install

      - name: Lab smoke (critical route / health / overview)
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  docker:
    name: Docker build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: docker build -t dna-app:ci .

  security:
    name: OWASP security gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (OWASP-aligned)
        run: pnpm audit --audit-level=high
