# DNA CI — generated by DNA by Humaan
# Mode: advisory (report only — safe for public repos)
# Quality gates on every push: lint, test, 80% coverage (per-file + total), OWASP audit.

name: DNA CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Unit tests
        run: pnpm run test
        continue-on-error: true

      - name: Coverage (80% gate)
        run: pnpm run test:coverage
        continue-on-error: true

      - name: Enforce per-file + total coverage >= 80%
        run: |
          node -e "
            const { readFileSync } = require('node:fs');
            const s = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const t = 80;
            const fail = [];
            for (const [file, m] of Object.entries(s)) {
              if (file === 'total') continue;
              if (m.lines.pct < t) fail.push(file + ': lines ' + m.lines.pct + '%');
            }
            if (s.total.lines.pct < t) fail.push('TOTAL: ' + s.total.lines.pct + '%');
            if (fail.length) { console.error(fail.join('\\n')); process.exit(1); }
          "
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: pnpm run build
        continue-on-error: true

      - name: DNA Lab load gate (200 concurrent viewers)
        run: pnpm run test:load:lab
        continue-on-error: true

      - name: DNA quality report (lint, test, coverage, SAST)
        run: npx --yes @superhumaan/dna-by-humaan quality report
        continue-on-error: true

  docker:
    name: Docker build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: docker build -t dna-app:ci .
        continue-on-error: true

  security:
    name: OWASP security gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (OWASP-aligned)
        run: pnpm audit --audit-level=high
        continue-on-error: true

