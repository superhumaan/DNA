name: Publish npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      # Never publish a red build — run the same gates CI enforces before we
      # push to npm. Coverage is scoped + enforced per file (see vitest.config).
      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests + coverage gate
        run: pnpm run test:coverage

      - name: Publish all @superhumaan/dna-* packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash scripts/publish-npm.sh
