# DNA Preview — deploy preview after DNA CI passes
# Provider: vercel | all branches
# Runs once per push (after DNA CI), not in parallel with it.

name: DNA Preview

on:
  workflow_run:
    workflows: [DNA CI]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-preview:
    name: Deploy preview
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      ${{ vars.VERCEL_PREVIEW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Deploy to Vercel preview
        run: npx --yes vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
